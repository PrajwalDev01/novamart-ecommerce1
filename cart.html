<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart | NovaMart</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .cart-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 2rem;
        }
        .cart-table th {
            text-align: left;
            padding: 1rem;
            border-bottom: 2px solid var(--border);
            color: var(--text-muted);
        }
        .cart-table td {
            padding: 2rem 1rem;
            border-bottom: 1px solid var(--border);
            color: var(--text);
        }
        .cart-img {
            width: 80px;
            height: 100px;
            object-fit: cover;
            border-radius: 10px;
        }
        .cart-summary {
            background: var(--surface);
            padding: 2rem;
            border-radius: 20px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            margin-top: 3rem;
            max-width: 400px;
            margin-left: auto;
        }
        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 1rem;
            color: var(--text);
        }
    </style>
</head>
<body>
    <nav>
        <div class="logo"><a href="index.html" style="text-decoration: none; color: inherit;">NovaMart</a></div>
        
        <div class="search-container">
            <form action="index.html" method="GET" class="search-form">
                <input type="text" name="search" placeholder="Search products, brands and more..." class="search-input">
                <button type="submit" class="search-btn">Search</button>
            </form>
        </div>

        <ul class="nav-links" id="nav-links">
            <!-- Dynamic -->
        </ul>
    </nav>

    <div class="container">
        <h2 class="section-title">Your Style Selection</h2>

        <div id="cart-content">
            <!-- Dynamically populated -->
        </div>
    </div>

    <footer>
        <p>&copy; 2026 NovaMart. All rights reserved.</p>
    </footer>

    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            renderCart();
        });

        function renderCart() {
            const container = document.getElementById('cart-content');
            const items = cart.getCart();

            if (items.length === 0) {
                container.innerHTML = `
                    <div style="text-align: center; padding: 5rem;">
                        <p style="font-size: 1.5rem; color: #636e72; margin-bottom: 2rem;">Your cart is empty.</p>
                        <a href="index.html" class="btn">Go Shopping</a>
                    </div>
                `;
                return;
            }

            const total = cart.getCartTotal();

            let rows = '';
            items.forEach(item => {
                const specLabel = item.color ? `${item.size} - ${item.color}` : item.size;
                rows += `
                    <tr>
                        <td style="display: flex; align-items: center; gap: 1.5rem;">
                            <img src="${item.imageUrl}" class="cart-img">
                            <div>
                                <h4 style="margin: 0;">${item.productName}</h4>
                            </div>
                        </td>
                        <td>${specLabel}</td>
                        <td>₹${item.price.toLocaleString('en-IN')}</td>
                        <td>
                            <input type="number" value="${item.quantity}" min="1" max="10" 
                                   style="width: 60px; padding: 0.4rem; border: 1px solid var(--border); border-radius: 5px;" 
                                   onchange="updateQty(${item.id}, this.value)">
                        </td>
                        <td style="font-weight: 700;">₹${(item.price * item.quantity).toLocaleString('en-IN')}</td>
                        <td>
                            <button onclick="removeItem(${item.id})" style="background: none; border: none; color: #DC2626; cursor: pointer; text-decoration: underline; font-family: inherit; font-size: 0.9rem;">Remove</button>
                        </td>
                    </tr>
                `;
            });

            container.innerHTML = `
                <table class="cart-table">
                    <thead>
                        <tr>
                            <th>Product</th>
                            <th>Size / Variant</th>
                            <th>Price</th>
                            <th>Quantity</th>
                            <th>Subtotal</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${rows}
                    </tbody>
                </table>

                <div class="cart-summary">
                    <h3 style="margin-bottom: 1.5rem;">Order Summary</h3>
                    <div class="summary-row">
                        <span>Subtotal</span>
                        <span>₹${total.toLocaleString('en-IN')}</span>
                    </div>
                    <div class="summary-row">
                        <span>Shipping</span>
                        <span style="color: #00b894;">FREE</span>
                    </div>
                    <hr style="border: none; border-top: 1px solid var(--light-gray); margin: 1rem 0;">
                    <div class="summary-row" style="font-weight: 800; font-size: 1.2rem;">
                        <span>Total</span>
                        <span>₹${total.toLocaleString('en-IN')}</span>
                    </div>
                    <a href="checkout.html" class="btn" style="width: 100%; text-align: center; margin-top: 1.5rem;">Proceed to Checkout</a>
                </div>
            `;
        }

        function updateQty(itemId, val) {
            const items = cart.getCart();
            const item = items.find(i => i.id === itemId);
            if (item) {
                item.quantity = parseInt(val);
                cart.saveCart(items);
                updateNavBadge();
                renderCart();
            }
        }

        function removeItem(itemId) {
            cart.removeFromCart(itemId);
            renderCart();
        }
    </script>
</body>
</html>
