<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Success | NovaMart</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body style="background: linear-gradient(135deg, #fdfcfb 0%, #e2d1c3 100%); height: 100vh; display: flex; align-items: center; justify-content: center;">

    <div style="text-align: center; background: white; padding: 4rem; border-radius: 40px; box-shadow: var(--shadow); max-width: 500px;">
        <div style="font-size: 5rem; color: #00b894; margin-bottom: 2rem;">✓</div>
        <h1 style="margin-bottom: 1rem;">Order Confirmed!</h1>
        <p id="success-msg" style="color: #636e72; font-size: 1.1rem; margin-bottom: 2.5rem;">Your order has been logged successfully under Cash on Delivery.</p>
        <p style="color: #636e72; margin-bottom: 2.5rem;">We're preparing your order for a journey to your doorstep.</p>
        <a href="index.html" class="btn">Continue Shopping</a>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            const msg = params.get('message');
            if (msg) {
                document.getElementById('success-msg').innerText = decodeURIComponent(msg);
            }
        });
    </script>
</body>
</html>
