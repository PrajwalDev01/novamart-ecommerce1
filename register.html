<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Us | NovaMart</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body style="background: linear-gradient(135deg, #fdfcfb 0%, #e2d1c3 100%); min-height: 100vh; padding: 2rem 0;">

    <div class="form-container" style="max-width: 600px;">
        <div style="text-align: center; margin-bottom: 2rem;">
            <div class="logo" style="margin-bottom: 1rem;"><a href="index.html" style="text-decoration: none; color: inherit;">NovaMart</a></div>
            <h2>Create Your Account</h2>
            <p style="color: #636e72;">Join our community of modern shoppers</p>
        </div>

        <div id="error-container"></div>

        <form id="register-form" onsubmit="handleRegister(event)">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="name" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" required>
                </div>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" required>
            </div>
            <div class="form-group">
                <label>Shipping Address</label>
                <textarea id="address" rows="3" required></textarea>
            </div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                <div class="form-group">
                    <label>City</label>
                    <input type="text" id="city" required>
                </div>
                <div class="form-group">
                    <label>Pincode</label>
                    <input type="text" id="pincode" required>
                </div>
            </div>
            <button type="submit" class="btn" style="width: 100%; border: none; cursor: pointer; margin-top: 1rem;">Create Account</button>
        </form>

        <p style="text-align: center; margin-top: 2rem; color: #636e72;">
            Already have an account? <a href="login.html" style="color: var(--primary); font-weight: 600; text-decoration: none;">Sign In</a>
        </p>
    </div>

    <script src="js/app.js"></script>
    <script>
        function handleRegister(event) {
            event.preventDefault();
            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const address = document.getElementById('address').value.trim();
            const city = document.getElementById('city').value.trim();
            const pincode = document.getElementById('pincode').value.trim();

            const res = auth.register(name, email, password, address, city, pincode);
            if (res.success) {
                // Log them in automatically or redirect to login
                auth.login(email, password);
                window.location.href = 'index.html';
            } else {
                const errDiv = document.getElementById('error-container');
                errDiv.innerHTML = `
                    <div style="background: #fee2e2; color: #991b1b; border: 1px solid #fca5a5; padding: 1rem; border-radius: 10px; margin-bottom: 1rem; text-align: center;">
                        ${res.error}
                    </div>
                `;
            }
        }
    </script>
</body>
</html>
