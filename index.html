<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NovaMart | Your Everything Store</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav>
        <div class="logo"><a href="index.html" style="text-decoration: none; color: inherit;">NovaMart</a></div>
        
        <div class="search-container">
            <form action="index.html" method="GET" class="search-form">
                <input type="text" name="search" placeholder="Search products, brands and more..." class="search-input" id="search-input">
                <button type="submit" class="search-btn">Search</button>
            </form>
        </div>

        <ul class="nav-links" id="nav-links">
            <!-- Rendered by app.js -->
        </ul>
    </nav>

    <header class="hero" id="hero-banner">
        <div class="hero-content">
            <h1>Modern Style meets <br> Smart Technology.</h1>
            <p>Explore a curated selection of fashion and tech essentials. Quality meets convenience at NovaMart.</p>
            <a href="#shop" class="btn">Explore Now</a>
        </div>
    </header>

    <main class="container" id="shop">
        <h2 class="section-title" id="section-title">Latest Arrivals</h2>

        <div class="product-grid" id="product-grid">
            <!-- Rendered by js/app.js / index.html inline script -->
        </div>
    </main>

    <footer>
        <p>&copy; 2026 NovaMart. All rights reserved.</p>
    </footer>

    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            const search = params.get('search');
            const category = params.get('category');
            
            const hero = document.getElementById('hero-banner');
            const sectionTitle = document.getElementById('section-title');
            const productGrid = document.getElementById('product-grid');
            const searchInput = document.getElementById('search-input');

            let products = db.getProducts();

            if (search) {
                hero.style.display = 'none';
                sectionTitle.innerText = `Search Results for "${search}"`;
                searchInput.value = search;
                products = products.filter(p => 
                    p.name.toLowerCase().includes(search.toLowerCase()) || 
                    p.description.toLowerCase().includes(search.toLowerCase())
                );
            } else if (category) {
                hero.style.display = 'none';
                const catObj = db.getCategoryById(category);
                sectionTitle.innerText = catObj ? catObj.name : 'Products';
                products = products.filter(p => p.categoryId === parseInt(category));
            } else {
                hero.style.display = 'flex';
                sectionTitle.innerText = 'Latest Arrivals';
            }

            if (products.length === 0) {
                productGrid.innerHTML = `
                    <div style="grid-column: 1/-1; text-align: center; padding: 4rem;">
                        <p style="font-size: 1.25rem; color: var(--text-muted);">No products found matching your selection.</p>
                        <a href="index.html" class="btn" style="margin-top: 1.5rem;">View All Products</a>
                    </div>
                `;
                return;
            }

            let html = '';
            products.forEach(p => {
                html += `
                    <div class="product-card">
                        <img src="${p.imageUrl}" alt="${p.name}" class="product-image">
                        <div class="product-info">
                            <h3>${p.name}</h3>
                            <p class="product-price">₹${p.price.toLocaleString('en-IN')}</p>
                            <a href="product-details.html?id=${p.id}" class="btn" style="margin-top: 1rem; padding: 0.6rem 1.5rem; font-size: 0.9rem;">View Details</a>
                        </div>
                    </div>
                `;
            });
            productGrid.innerHTML = html;
        });
    </script>
</body>
</html>
